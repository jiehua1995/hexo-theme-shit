  - q: Is SHIT a real journal?
    a: It is a real website for a fictional journal system with a clear satire notice.

  - q: Are the articles peer-reviewed?
    a: They are reviewed by an imaginary editorial process involving at least one hostile but unavailable Reviewer 2.

  - q: Can I cite SHIT articles?
    a: You can, but you should disclose context, genre, and your own standards of evidence.

  - q: Can I submit my own manuscript?
    a: Yes. The default workflow routes submissions through GitHub Issues.

  - q: Are the references real?
    a: Sometimes. Others are fictional, emotionally necessary, or generated upon reasonable hallucination.

  - q: Are AI-generated articles allowed?
    a: Yes, when clearly labeled and not presented as professional advice.

  - q: What happens if an article accidentally becomes true?
    a: It may be corrected, celebrated, or retracted depending on tone and timing.

# ----------------------------------------------------------
# For Authors / 作者指南
# Author submission guidelines displayed on the For Authors page.
# 显示在作者指南页的投稿指导。
# ----------------------------------------------------------
for_authors:
  # Manuscript categories / 稿件分类
  manuscript_categories:
    - title: Retraction-Ready Report
      description: For studies whose conclusions are mature enough for immediate concern.
    - title: Imaginary Dataset
      description: For datasets that would have been useful if they existed.
    - title: Unnecessary Methods
      description: For methods solving problems nobody was willing to define.
    - title: Computational Daydream
      description: For simulations performed primarily in the author's imagination.
    - title: Peer Review Theater
      description: For dramatized academic suffering involving Reviewer 2.
    - title: Grant Proposal Fiction
      description: For administrative documents with excessive confidence and insufficient budget.
    - title: Citation Needed
      description: For short claims urgently requiring references, preferably after publication.
    - title: Synthetic Review
      description: For AI-generated reviews with strong formatting and uncertain ontology.

  # General requirements / 一般要求
  general_requirements:
    - The title must sound more confident than the evidence.
    - The abstract should include at least one sentence beginning with "Here we show".
    - Methods must be sufficiently detailed to appear reproducible.
    - Results may be statistically significant, spiritually significant, or administratively significant.
    - At least one limitation must be acknowledged and immediately ignored.
    - References may be real, fictional, emotionally necessary, or generated upon reasonable hallucination.
    - Conclusions should exceed the available evidence by at least 300%.

  # Submission checklist / 投稿清单
  checklist:
    - The manuscript contains at least one unnecessary acronym.
    - The conclusions exceed the data.
    - Reviewer 2 has been emotionally anticipated.
    - All imaginary participants have provided imaginary consent.
    - The data are available upon reasonable hallucination.
    - The article is clearly labeled as satire, fiction, AI-generated, or not professional advice where appropriate.

# ----------------------------------------------------------
# Policies / 政策声明
# Ethics, disclaimer, and other policies displayed on the Policies page.
# 显示在政策页的道德规范、免责声明等。
# ----------------------------------------------------------
policies:
  - title: Research Ethics
    text: Imaginary participants must be treated with dignity, fictional consent, and appropriate ceremonial oversight.

  - title: AI-Generated Content Policy
    text: SHIT welcomes AI-generated manuscripts, provided that the hallucinations are clearly labeled, aesthetically formatted, and not mistaken for professional advice.

  - title: Fictional Data Policy
    text: Fictional data must be internally consistent unless inconsistency is central to the hypothesis.

  - title: Peer Review Policy
    text: All manuscripts are reviewed by an imaginary editorial process involving at least one hostile but unavailable Reviewer 2.

  - title: Conflict of Interest
    text: Authors must disclose all conflicts with reality, causality, statistics, and common sense.

  - title: Correction and Retraction Policy
    text: Articles may be corrected for formatting drift and retracted if they accidentally become true.

  - title: Professional Advice Disclaimer
    text: Nothing published here should be interpreted as scientific, medical, legal, financial, academic, immigration, career, or professional advice.

  - title: Citation Policy
    text: Citations may be real, fictional, emotionally necessary, or generated after publication, but should be clearly attributable in tone.

  - title: Data Availability Policy
    text: Data should be available upon reasonable hallucination unless absence is integral to the method.

  - title: Code Availability Policy
    text: Code should be provided when it exists, when it helps, or when its nonexistence contributes to the narrative.

  - title: Plagiarism Policy
    text: Authors should avoid copying from reality without appropriate transformation and satire labeling.

  - title: Accidental Truth Policy
    text: If a manuscript becomes empirically supported, the editorial board may issue a note of concern and a reluctant congratulations.

