<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 540" fill="none">
  <rect width="420" height="540" fill="#f8f6f0"/>
  <rect width="420" height="540" fill="none" stroke="#2a3040" stroke-width="2"/>
  <!-- Header bar with different accent -->
  <rect x="0" y="0" width="420" height="130" fill="#3b2a2a"/>
  <text x="30" y="55" font-family="Georgia,serif" font-size="36" fill="#e8e4dc" font-weight="bold">SHIT</text>
  <text x="30" y="82" font-family="'Segoe UI',sans-serif" font-size="11" fill="#c4a84a">Vol. 1 · Issue 0 · May 2026</text>
  <line x1="0" y1="130" x2="420" y2="130" stroke="#8f2333" stroke-width="2"/>
  
  <!-- Main feature article -->
  <text x="30" y="165" font-family="Georgia,serif" font-size="18" fill="#2a3040" font-weight="bold">Foundational Nonsense and</text>
  <text x="30" y="188" font-family="Georgia,serif" font-size="18" fill="#2a3040" font-weight="bold">Administrative Overconfidence</text>
  
  <!-- Fake "office plants" diagram -->
  <rect x="30" y="210" width="360" height="100" fill="#eef2f4" rx="2"/>
  <text x="210" y="225" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="8" fill="#8a857c">Correlation: Office Plants vs. Reviewer Sympathy (r = -0.001, p = not tested)</text>
  <!-- Decorative elements -->
  <rect x="50" y="240" width="8" height="60" rx="2" fill="#5a9abf" opacity="0.3"/>
  <circle cx="54" cy="235" r="10" fill="#146f7a" opacity="0.3"/>
  <rect x="150" y="250" width="8" height="50" rx="2" fill="#5a9abf" opacity="0.3"/>
  <circle cx="154" cy="245" r="10" fill="#146f7a" opacity="0.3"/>
  <rect x="250" y="245" width="8" height="55" rx="2" fill="#5a9abf" opacity="0.3"/>
  <circle cx="254" cy="240" r="10" fill="#146f7a" opacity="0.3"/>
  <rect x="350" y="255" width="8" height="45" rx="2" fill="#5a9abf" opacity="0.3"/>
  <circle cx="354" cy="250" r="10" fill="#146f7a" opacity="0.3"/>
  <path d="M54 235 L154 245 L254 240 L354 250" stroke="#c4a84a" stroke-width="1" fill="none" stroke-dasharray="4 3"/>
  
  <!-- "Looked peer reviewed" stamp -->
  <rect x="30" y="330" width="360" height="180" fill="#fafaf8" stroke="#d5d1c8" stroke-width="1" rx="2"/>
  <text x="50" y="355" font-family="Georgia,serif" font-size="14" fill="#2a3040" font-weight="bold">Table of Contents</text>
  <line x1="50" y1="365" x2="370" y2="365" stroke="#e0dcd4" stroke-width="1"/>
  
  <rect x="50" y="375" width="20" height="12" rx="6" fill="#8f2333"/>
  <text x="80" y="385" font-family="'Segoe UI',sans-serif" font-size="9" fill="#4a453c">A Negative Result on the Existence of Work-Life Balance</text>
  
  <rect x="50" y="398" width="20" height="12" rx="6" fill="#c4a84a"/>
  <text x="80" y="408" font-family="'Segoe UI',sans-serif" font-size="9" fill="#4a453c">Prenatal Excellence and Citation-Dependent Human Development</text>
  
  <rect x="50" y="421" width="20" height="12" rx="6" fill="#146f7a"/>
  <text x="80" y="431" font-family="'Segoe UI',sans-serif" font-size="9" fill="#4a453c">The Evolutionary Ecology of Reviewer 2 in Competitive Academic Habitats</text>
  
  <rect x="50" y="444" width="20" height="12" rx="6" fill="#2d4a5e"/>
  <text x="80" y="454" font-family="'Segoe UI',sans-serif" font-size="9" fill="#4a453c">Administrative Feng-Shui Improves Grant Success in Windowless Offices</text>
  
  <!-- Stamp -->
  <rect x="240" y="470" width="140" height="30" rx="3" fill="none" stroke="#8f2333" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="310" y="490" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#8f2333" font-weight="bold">PEER REVIEWED</text>
  
  <!-- Bottom tagline -->
  <text x="210" y="520" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#6a7b8c" font-style="italic">Pilot issue for papers that looked peer reviewed from across the room.</text>
</svg>
