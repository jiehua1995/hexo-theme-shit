<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280" fill="none">
  <rect width="480" height="280" fill="#f7f6f1"/>
  <rect x="1" y="1" width="478" height="278" fill="none" stroke="#3e4c30" stroke-width="2"/>
  <text x="240" y="28" text-anchor="middle" font-family="Georgia,serif" font-size="13" fill="#3e4c30" font-weight="bold">Figure 1: Pipeline for Converting Vague Results into Decisive Prose</text>
  
  <!-- Step boxes -->
  <rect x="20" y="50" width="100" height="50" rx="4" fill="#f0ede5" stroke="#3e4c30" stroke-width="2"/>
  <text x="70" y="70" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="8" fill="#3e4c30" font-weight="bold">Input:</text>
  <text x="70" y="85" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="7" fill="#6a655c">"might work"</text>
  <text x="70" y="96" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="7" fill="#6a655c">"possibly"</text>
  
  <line x1="120" y1="75" x2="145" y2="75" stroke="#3e4c30" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <rect x="145" y="50" width="100" height="50" rx="4" fill="#e8f0e0" stroke="#3e4c30" stroke-width="2"/>
  <text x="195" y="70" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="8" fill="#3e4c30" font-weight="bold">Transformer</text>
  <text x="195" y="85" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="7" fill="#6a655c">+ Elegance Prior</text>
  <text x="195" y="96" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="7" fill="#8f2333" font-style="italic">penalize humility</text>
  
  <line x1="245" y1="75" x2="270" y2="75" stroke="#3e4c30" stroke-width="2"/>
  
  <rect x="270" y="50" width="100" height="50" rx="4" fill="#e0f0f4" stroke="#3e4c30" stroke-width="2"/>
  <text x="320" y="70" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="8" fill="#3e4c30" font-weight="bold">Secondary</text>
  <text x="320" y="85" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="8" fill="#3e4c30" font-weight="bold">Decoder</text>
  <text x="320" y="96" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="7" fill="#6a655c">insert "mechanism"</text>
  
  <line x1="370" y1="75" x2="395" y2="75" stroke="#3e4c30" stroke-width="2"/>
  
  <rect x="395" y="50" width="70" height="50" rx="4" fill="#f0e8d8" stroke="#c4a84a" stroke-width="2"/>
  <text x="430" y="70" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="8" fill="#3e4c30" font-weight="bold">Output:</text>
  <text x="430" y="85" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="7" fill="#3e4c30">"we show"</text>
  <text x="430" y="96" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="7" fill="#c4a84a">"robust"</text>
  
  <!-- Bottom: loss components -->
  <text x="240" y="130" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#3e4c30" font-weight="bold">Additional Loss Terms</text>
  <line x1="60" y1="138" x2="420" y2="138" stroke="#d0ccc4" stroke-width="1"/>
  
  <!-- Red bars for things being penalized -->
  <rect x="60" y="155" width="80" height="40" rx="3" fill="#8f2333" opacity="0.3" stroke="#8f2333" stroke-width="1"/>
  <text x="100" y="172" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="8" fill="#8f2333">-hedging</text>
  <text x="100" y="185" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="7" fill="#6a5f50">+replication risk</text>
  
  <rect x="160" y="155" width="80" height="40" rx="3" fill="#8f2333" opacity="0.3" stroke="#8f2333" stroke-width="1"/>
  <text x="200" y="172" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="8" fill="#8f2333">-humility</text>
  <text x="200" y="185" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="7" fill="#6a5f50">-caveats</text>
  
  <rect x="260" y="155" width="80" height="40" rx="3" fill="#8f2333" opacity="0.3" stroke="#8f2333" stroke-width="1"/>
  <text x="300" y="172" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="8" fill="#8f2333">-uncertainty</text>
  <text x="300" y="185" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="7" fill="#6a5f50">-maybe</text>
  
  <rect x="360" y="155" width="70" height="40" rx="3" fill="#8f2333" opacity="0.3" stroke="#8f2333" stroke-width="1"/>
  <text x="395" y="172" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="8" fill="#8f2333">-sorry</text>
  <text x="395" y="185" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="7" fill="#6a5f50">-approximately</text>
  
  <!-- Arrow down from loss bar to result -->
  <line x1="240" y1="200" x2="240" y2="215" stroke="#3e4c30" stroke-width="2"/>
  
  <rect x="140" y="215" width="200" height="40" rx="4" fill="#3e4c30"/>
  <text x="240" y="233" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#e8e4dc" font-weight="bold">Statistically Significant Sentences</text>
  <text x="240" y="248" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="8" fill="#c4a84a">p &lt; 0.0001, but meaningless</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3e4c30"/>
    </marker>
  </defs>
</svg>
